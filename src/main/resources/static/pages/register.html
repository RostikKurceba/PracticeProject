<!DOCTYPE html>

<html lang="uk">

<head>

    <meta charset="UTF-8">

    <title>Реєстрація</title>

    <link rel="stylesheet" href="../css/register.css">

</head>

<body>

<div class="container">

    <h2 id="title"></h2>

    <input
            type="text"
            id="lastName"
            placeholder="Прізвище">

    <input
            type="text"
            id="firstName"
            placeholder="Ім'я">

    <input
            type="text"
            id="middleName"
            placeholder="По батькові">

    <input
            type="email"
            id="email"
            placeholder="Email">

    <input
            type="password"
            id="password"
            placeholder="Пароль">

    <div id="teacherField"></div>

    <button>
        Зареєструватися
    </button>

</div>

<script src="../js/api.js"></script>
<script src="../js/register.js"></script>

</body>

</html>
